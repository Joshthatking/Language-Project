<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Transcription & Translation - Journal</title>
    <link rel="stylesheet" href="journal.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <div class="top-bar-left">
            <a href="index.html" class="home-btn" aria-label="Home">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Home</span>
            </a>
        </div>
        <h1 class="app-title">Language Transcription & Translation</h1>
        <div class="top-bar-right">
            <button class="icon-btn" id="profile-btn" aria-label="Profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
            <button class="icon-btn" id="settings-btn" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-container">
        <!-- Central Notebook -->
        <div class="notebook-section">
            <!-- Listening for transcription (above journal) -->
            <div class="listening-indicator" id="listening-indicator">
                <button class="mic-toggle-btn" id="mic-toggle-btn" aria-label="Toggle microphone">
                    <svg class="mic-icon" id="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <svg class="mic-muted-icon" id="mic-muted-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                        <path d="M1 1l22 22"></path>
                        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                </button>
                <div class="waveform" id="waveform">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
                <span class="listening-text" id="listening-text">Listening for transcription...</span>
                <button class="lang-script-btn" id="lang-script-btn" aria-label="Toggle script: Latin">
                    <span class="lang-script-abc" id="lang-script-abc">abc</span>
                    <span class="lang-script-char" id="lang-script-char" style="display: none;">文</span>
                </button>
            </div>
            <div class="notebook">
                <!-- Shared journal title (changeable, applies to both sides) -->
                <div class="journal-title-wrap">
                    <div class="journal-title-center">
                        <h2 class="journal-title" contenteditable="true" id="journal-title" data-placeholder="Journal">Journal</h2>
                    </div>
                    <button type="button" class="study-btn" id="study-btn">Study</button>
                </div>
                <div class="notebook-spread" id="notebook-spread">
                    <!-- Left Page -->
                    <div class="page left-page">
                        <div class="page-content">
                            <div class="language-select-wrap">
                                <button type="button" class="language-btn" id="language-left-btn" aria-haspopup="listbox" aria-expanded="false">
                                    <span class="language-btn-label" id="language-left-label">English</span>
                                    <svg class="language-btn-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="language-dropdown" id="language-left-dropdown" role="listbox" aria-hidden="true"></div>
                            </div>
                            <div class="page-text" contenteditable="true" id="english-text">
                                Waiting for transcription... Type or dictate here.
                            </div>
                        </div>
                    </div>

                    <!-- Binding -->
                    <div class="binding">
                        <div class="binding-stitch"></div>
                        <div class="binding-stitch"></div>
                        <div class="binding-stitch"></div>
                        <div class="binding-stitch"></div>
                        <div class="binding-stitch"></div>
                    </div>

                    <!-- Right Page -->
                    <div class="page right-page">
                        <div class="page-content">
                            <div class="language-select-wrap">
                                <button type="button" class="language-btn" id="language-right-btn" aria-haspopup="listbox" aria-expanded="false">
                                    <span class="language-btn-label" id="language-right-label">Spanish</span>
                                    <svg class="language-btn-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"></polyline>
                                    </svg>
                                </button>
                                <div class="language-dropdown" id="language-right-dropdown" role="listbox" aria-hidden="true"></div>
                            </div>
                            <div class="page-text" contenteditable="true" id="spanish-text">
                                Traducción pendiente... Escriba o dicte aquí.
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Study mode: single centered page with flip -->
                <div class="study-mode-view" id="study-mode-view" aria-hidden="true">
                    <div class="study-mode-inner">
                        <div class="study-card" id="study-card">
                            <div class="study-card-inner" id="study-card-inner">
                                <div class="study-face study-face-source" id="study-face-source">
                                    <div class="study-face-label" id="study-source-label">English</div>
                                    <div class="study-face-text" id="study-source-text"></div>
                                </div>
                                <div class="study-face study-face-target" id="study-face-target">
                                    <div class="study-face-label" id="study-target-label">Spanish</div>
                                    <div class="study-face-text" id="study-target-text"></div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="flip-page-btn" id="flip-page-btn">
                            <span id="flip-page-btn-text">Show translation</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Save Journal Button -->
            <div class="save-button-container">
                <button class="save-journal-btn" id="save-journal-btn">
                    <svg class="save-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    <span>Save Journal</span>
                </button>
            </div>
        </div>

        <!-- Right Sidebar - Saved Journals -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-title">Saved Journals</h2>
                <button type="button" class="new-journal-btn" id="new-journal-btn" aria-label="New journal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
            <div class="journal-list" id="journal-list">
                <div class="journal-item">
                    <svg class="journal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="journal-name">Journal - Oct 25</span>
                </div>
                <div class="journal-item">
                    <svg class="journal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="journal-name">Lecture Notes - Oct 24</span>
                </div>
                <div class="journal-item">
                    <svg class="journal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="journal-name">Interview - Oct 29</span>
                </div>
                <div class="journal-item">
                    <svg class="journal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span class="journal-name">Lecture Notes - Oct 22</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="journal.js"></script>
</body>
</html>
